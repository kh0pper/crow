## Crow AI Platform — Render.com One-Click Deploy
## Click "New" → "Blueprint" on Render and point to this repo.
## Or use the Deploy to Render button in the README.

services:
  - type: web
    name: crow-gateway
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev && node scripts/init-db.js
    startCommand: node servers/gateway/index.js
    healthCheckPath: /health
    envVars:
      - key: CROW_TRANSPORT
        value: http
      - key: CROW_GATEWAY_PORT
        value: "3001"
      - key: CROW_DB_PATH
        value: ./data/crow.db
