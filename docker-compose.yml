## Crow — Docker Compose
##
## Cloud deployment:
##   docker compose --profile cloud up --build
##
## Local with Cloudflare Tunnel:
##   docker compose --profile local up --build

services:
  crow-gateway:
    build: .
    ports:
      - "127.0.0.1:${CROW_GATEWAY_PORT:-3001}:3001"
    volumes:
      - ${CROW_DATA_DIR:-./data}:/app/data
    env_file: .env
    environment:
      - CROW_TRANSPORT=http
      - CROW_GATEWAY_PORT=3001
      - CROW_DB_PATH=/app/data/crow.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles: [cloud, local]

  # Optional: MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-crowadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9001:9001"   # Console (not exposed in production)
    # API port 9000 is internal-only (accessible to crow-gateway via Docker network)
    expose:
      - "9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles: [storage, full]

  # Optional: Cloudflare Tunnel for home network access
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      crow-gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles: [local]

volumes:
  minio-data:
