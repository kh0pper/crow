services:
  companion:
    build:
      context: .
      dockerfile: Dockerfile
    image: crow-companion
    container_name: crow-companion
    restart: unless-stopped
    network_mode: host
    volumes:
      - companion-models:/app/models
      - companion-cache:/app/cache
      - companion-history:/app/chat_history
      - ${EIKANYA_MODELS_DIR:-}:/app/live2d-models/eikanya:ro
      - ${CROW_DB_PATH:-~/.crow/data/crow.db}:/crow-data/crow.db:ro
      - ${HOME}/.crow/bundles:/crow-bundles:ro
    environment:
      - COMPANION_TTS_VOICE=${COMPANION_TTS_VOICE:-en-US-AvaMultilingualNeural}
      - COMPANION_PERSONA=${COMPANION_PERSONA:-You are Crow, an AI companion and assistant. You are helpful, curious, and have a dry wit. Keep responses conversational and concise since they will be spoken aloud.}
      - COMPANION_CHARACTER_NAME=${COMPANION_CHARACTER_NAME:-Crow}
      - COMPANION_AVATAR=${COMPANION_AVATAR:-mao_pro}
      - COMPANION_AI_PROFILE=${COMPANION_AI_PROFILE:-}
      - COMPANION_AI_MODEL=${COMPANION_AI_MODEL:-}
      - COMPANION_BIND_HOST=${COMPANION_BIND_HOST:-127.0.0.1}
      - CROW_DB_PATH=/crow-data/crow.db
      # MCP bridge to the local Crow gateway (host network → localhost). The
      # gateway listens on 3001 by default; /router and /storage need the local
      # MCP bearer token, /wm is open. (The old 3004 default pointed at nothing.)
      - CROW_MCP_BRIDGE_PORT=${CROW_MCP_BRIDGE_PORT:-3001}
      - CROW_LOCAL_MCP_TOKEN=${CROW_LOCAL_MCP_TOKEN:-}
      # Model-routing proxy: OLVV's LLM base_url. Routes fast (Qwen3.5-4B) ->
      # escalation (35B) and forwards tools verbatim. Host network → localhost.
      # Unset to talk to a model directly (Part 0 fallback).
      - COMPANION_PROXY_URL=${COMPANION_PROXY_URL:-http://localhost:11435/v1}
      - SDXL_HOST=${SDXL_HOST:-localhost}
      - SDXL_PORT=${SDXL_PORT:-3005}
      - CROW_GATEWAY_URL=${CROW_GATEWAY_URL:-}
      - COMPANION_PROFILE_1_NAME=${COMPANION_PROFILE_1_NAME:-}
      - COMPANION_PROFILE_1_COLOR=${COMPANION_PROFILE_1_COLOR:-#818cf8}
    mem_limit: 2g

volumes:
  companion-models:
  companion-cache:
  companion-history:
