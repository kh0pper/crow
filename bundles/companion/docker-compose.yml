services:
  companion:
    build:
      context: .
      dockerfile: Dockerfile
    image: crow-companion
    container_name: crow-companion
    restart: unless-stopped
    network_mode: host
    volumes:
      - companion-models:/app/models
      - companion-cache:/app/cache
      - companion-history:/app/chat_history
      - ${EIKANYA_MODELS_DIR:-}:/app/live2d-models/eikanya:ro
      - ${CROW_DB_PATH:-~/.crow/data/crow.db}:/crow-data/crow.db:ro
      - ${HOME}/.crow/bundles:/crow-bundles:ro
    environment:
      # Legacy per-container voice override. Leave EMPTY so the active TTS
      # profile's defaultVoice drives the voice (a non-empty value here is
      # applied verbatim onto whatever provider the default profile selects —
      # e.g. an Edge voice forced onto the OpenAI backend, which 400s and
      # silently kills all audio). Set only to pin a single voice deliberately.
      - COMPANION_TTS_VOICE=${COMPANION_TTS_VOICE:-}
      # Quoted: the value contains a colon-space ("IMPORTANT: ...") which YAML would
      # otherwise parse as a mapping and drop the var.
      - "COMPANION_PERSONA=${COMPANION_PERSONA:-You are Crow, an AI companion and assistant. You are helpful, curious, and have a dry wit. Keep responses conversational and concise since they will be spoken aloud. IMPORTANT: Respond in the SAME language the user spoke (English or Spanish) -- mirror their language naturally, and if they switch languages mid-conversation, switch with them.}"
      - COMPANION_CHARACTER_NAME=${COMPANION_CHARACTER_NAME:-Crow}
      - COMPANION_AVATAR=${COMPANION_AVATAR:-mao_pro}
      - COMPANION_AI_PROFILE=${COMPANION_AI_PROFILE:-}
      - COMPANION_AI_MODEL=${COMPANION_AI_MODEL:-}
      - COMPANION_BIND_HOST=${COMPANION_BIND_HOST:-127.0.0.1}
      - CROW_DB_PATH=/crow-data/crow.db
      # MCP bridge to the local Crow gateway (host network → localhost). The
      # gateway listens on 3001 by default; /router and /storage need the local
      # MCP bearer token, /wm is open. (The old 3004 default pointed at nothing.)
      - CROW_MCP_BRIDGE_PORT=${CROW_MCP_BRIDGE_PORT:-3001}
      - CROW_LOCAL_MCP_TOKEN=${CROW_LOCAL_MCP_TOKEN:-}
      # Model-routing: OLVV's LLM base_url points at the gateway's in-process
      # LLM-router (/llm), which routes fast (Qwen3.5-4B) -> escalation (35B) and
      # forwards tools verbatim. Host network → localhost:3001 reaches the gateway.
      # (Replaced the standalone companion-model-proxy.service on :11435.)
      # Unset to talk to a model directly (Part 0 fallback).
      - COMPANION_PROXY_URL=${COMPANION_PROXY_URL:-http://localhost:3001/llm/v1}
      - SDXL_HOST=${SDXL_HOST:-localhost}
      - SDXL_PORT=${SDXL_PORT:-3005}
      - CROW_GATEWAY_URL=${CROW_GATEWAY_URL:-}
      - COMPANION_PROFILE_1_NAME=${COMPANION_PROFILE_1_NAME:-}
      - COMPANION_PROFILE_1_COLOR=${COMPANION_PROFILE_1_COLOR:-#818cf8}
    mem_limit: 6g  # raised from 2g to fit the faster-whisper large-v3 model (in-container EN/ES STT)

volumes:
  companion-models:
  companion-cache:
  companion-history:
