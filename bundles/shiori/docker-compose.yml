services:
  shiori:
    image: ghcr.io/go-shiori/shiori:latest
    container_name: crow-shiori
    ports:
      - "127.0.0.1:8086:8080"
    volumes:
      - shiori-data:/shiori
    init: true
    mem_limit: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/system"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  shiori-data:
