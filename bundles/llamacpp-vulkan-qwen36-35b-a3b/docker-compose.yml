services:
  llamacpp-vulkan-qwen36-35b-a3b:
    # Everyday driver: Qwen3.6-35B-A3B (MoE ~3B active) + vision, MTP-accelerated.
    # Phase-1 benchmark (2026-05-23) chose Vulkan (RADV) + MTP draft-n2 + vision:
    #   ~66.6 tok/s single-stream (code) vs ~47 for the old non-MTP parallel-4 path;
    #   KLD vs BF16 = 0.012 (near-lossless). MTP + --mmproj DO co-load on this build
    #   (verified §1.A gate). MTP requires the vulkan-radv-mtp toolbox and -np 1
    #   (no --parallel) — so this is single-stream (no 4-way concurrency), chosen
    #   for interactive use. Backend split is model-specific: 35B→Vulkan, 122B→ROCm.
    image: kyuz0/amd-strix-halo-toolboxes:vulkan-radv-mtp
    container_name: llamacpp-vulkan-qwen36-35b-a3b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      # MTP GGUF + mmproj pre-downloaded to /home/kh0pp/llm/hf-cache/qwen36-35b-a3b-mtp/
      # from unsloth/Qwen3.6-35B-A3B-MTP-GGUF (UD-Q6_K + mmproj-F16).
      - -m
      - /models/qwen36-35b-a3b-mtp/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      - --mmproj
      - /models/qwen36-35b-a3b-mtp/mmproj-F16.gguf
      - --alias
      - qwen3.6-35b-a3b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "on"
      - --no-mmap
      # Single 256K native window (np 1; MTP is incompatible with --parallel >1).
      - -c
      - "262144"
      - -np
      - "1"
      - --spec-type
      - draft-mtp
      - --spec-draft-n-max
      - "2"
      - --jinja
    restart: always
    ipc: host
    shm_size: 16g
