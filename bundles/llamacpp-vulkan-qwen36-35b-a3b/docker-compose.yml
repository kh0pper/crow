services:
  llamacpp-vulkan-qwen36-35b-a3b:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2.1
    container_name: llamacpp-vulkan-qwen36-35b-a3b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      # Pre-downloaded to /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/ by:
      #   curl -L -o /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/Qwen3.6-35B-A3B-UD-Q6_K.gguf \
      #        https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      #   curl -L -o /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/mmproj-F16.gguf \
      #        https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/mmproj-F16.gguf
      - -m
      - /models/qwen36-35b-a3b/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      - --mmproj
      - /models/qwen36-35b-a3b/mmproj-F16.gguf
      - --alias
      - qwen3.6-35b-a3b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "on"
      - --no-mmap
      # 4 slots × 256K each (full native Qwen3.6 window per slot).
      # n_ctx_train=262144 per the GGUF metadata, so no YaRN needed.
      # `-c` is TOTAL KV budget divided across slots — 1048576 / 4 = 262144
      # per slot.
      #
      # Sparse attention makes this cheap: only ~10 layers cache full KV,
      # so 262144 cells × 10 layers × 2 (K+V) × fp16 = 5 GB per slot.
      # 4 slots × 5 GB = 20 GB KV. Plus 27 GB weights ≈ 47 GB total of
      # the 124 GB unified pool, 77 GB headroom.
      #
      # Concurrent throughput measured:
      #   solo:       44.6 tok/s
      #   2 parallel: 35 tok/s each, 67 tok/s aggregate (1.5× over solo)
      # Some batching overhead is normal; aggregate keeps climbing up to
      # compute saturation (well above 4 streams on this hardware).
      - -c
      - "1048576"
      - --parallel
      - "4"
      - --jinja
    restart: "no"
    ipc: host
    shm_size: 16g
