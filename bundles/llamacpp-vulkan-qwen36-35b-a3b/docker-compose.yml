services:
  llamacpp-vulkan-qwen36-35b-a3b:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2.1
    container_name: llamacpp-vulkan-qwen36-35b-a3b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      # Pre-downloaded to /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/ by:
      #   curl -L -o /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/Qwen3.6-35B-A3B-UD-Q6_K.gguf \
      #        https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      #   curl -L -o /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/mmproj-F16.gguf \
      #        https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/mmproj-F16.gguf
      - -m
      - /models/qwen36-35b-a3b/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      - --mmproj
      - /models/qwen36-35b-a3b/mmproj-F16.gguf
      - --alias
      - qwen3.6-35b-a3b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "on"
      - --no-mmap
      # 128K single-slot. Qwen3.6 is trained NATIVELY at 256K
      # (n_ctx_train=262144 per the GGUF metadata), so no YaRN/RoPE
      # scaling is needed — the model can use any -c up to 131072 cleanly
      # and could go to 262144 if we want the full native window (trading
      # ~25 GB more KV cache). --parallel 1 because Crow's tool-heavy
      # conversations consume context depth faster than they benefit from
      # slot concurrency; KV cache ~25 GB on top of the 33 GB weights fits
      # comfortably in Strix Halo's 124 GB unified pool.
      - -c
      - "131072"
      - --parallel
      - "1"
      - --jinja
    restart: "no"
    ipc: host
    shm_size: 16g
