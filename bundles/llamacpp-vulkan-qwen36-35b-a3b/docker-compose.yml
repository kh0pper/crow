services:
  llamacpp-vulkan-qwen36-35b-a3b:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2.1
    container_name: llamacpp-vulkan-qwen36-35b-a3b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      # Pre-downloaded to /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/ by:
      #   curl -L -o /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/Qwen3.6-35B-A3B-UD-Q6_K.gguf \
      #        https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      #   curl -L -o /home/kh0pp/llm/hf-cache/qwen36-35b-a3b/mmproj-F16.gguf \
      #        https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/mmproj-F16.gguf
      - -m
      - /models/qwen36-35b-a3b/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      - --mmproj
      - /models/qwen36-35b-a3b/mmproj-F16.gguf
      - --alias
      - qwen3.6-35b-a3b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "on"
      - --no-mmap
      # 256K single-slot — the full native training context of Qwen3.6.
      # n_ctx_train=262144 per the GGUF metadata, so no YaRN/RoPE scaling
      # needed. --parallel 1 keeps all KV cache available to the one
      # in-flight conversation. KV cache is allocated lazily per-slot as
      # tokens arrive, so the 50 GB ceiling is not an always-resident
      # cost — short conversations pay ~0 extra VRAM. Ceiling math:
      #   33 GB weights + 50 GB KV (at fill) = 83 GB of 124 GB unified
      # Second in-flight request queues. Prefill time scales linearly with
      # input length (~0.5 ms/tok), so a near-full prompt can take ~90s to
      # prefill before the first output token; rare in practice.
      - -c
      - "262144"
      - --parallel
      - "1"
      - --jinja
    restart: "no"
    ipc: host
    shm_size: 16g
