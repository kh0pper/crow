services:
  kolibri:
    image: learningequality/kolibri:latest
    container_name: crow-kolibri
    ports:
      - "127.0.0.1:${KOLIBRI_HTTP_PORT:-8085}:8080"
    volumes:
      - ${KOLIBRI_DATA_PATH:-kolibri-data}:/kolibrihome
    environment:
      - KOLIBRI_HTTP_PORT=8080
      - KOLIBRI_LANG=en
      - KOLIBRI_FACILITY_NAME=${KOLIBRI_FACILITY_NAME:-Home Lab}
    init: true
    mem_limit: 1500m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/public/info/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  kolibri-data:
