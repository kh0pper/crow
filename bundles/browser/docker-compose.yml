services:
  crow-browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crow-browser
    network_mode: host
    environment:
      - DISPLAY=:99
      - VNC_PASSWORD=${CROW_BROWSER_VNC_PASSWORD:?VNC password is required}
      - CDP_PORT=9222
      - CHROME_PROXY=${CROW_BROWSER_PROXY:-}
    volumes:
      - /home/kh0pp/.crow/browser-downloads:/downloads
    init: true
    mem_limit: 2g
    shm_size: 1g
    restart: unless-stopped
