services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: crow-navidrome
    ports:
      - "127.0.0.1:4533:4533"
    volumes:
      - ${NAVIDROME_MUSIC_PATH:?Set NAVIDROME_MUSIC_PATH}:/music:ro
      - navidrome-data:/data
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
    init: true
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4533/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  navidrome-data:
