services:
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: crow-actual-budget
    ports:
      - "127.0.0.1:5006:5006"
    volumes:
      - actual-data:/data
    init: true
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  actual-data:
