services:
  vllm-rocm-qwen35-4b:
    image: ${VLLM_ROCM_IMAGE}
    container_name: vllm-rocm-qwen35-4b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    environment:
      HF_HOME: /models
      HUGGING_FACE_HUB_TOKEN: ${VLLM_HF_TOKEN:-}
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8011:8000"
    entrypoint: ["vllm", "serve"]
    command:
      - Qwen/Qwen3.5-4B
      - --served-model-name
      - qwen3.5-4b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.12"
      - --max-model-len
      - "8192"
      - --max-num-seqs
      - "8"
      - --enable-auto-tool-choice
      # Qwen3.5 emits XML-style tool calls (<tool_call><function=NAME><parameter=KEY>…)
      # which the `hermes` parser (expects <tool_call>{json}</tool_call>) cannot parse —
      # it leaves tool calls as raw text, swallowed entirely in streaming mode, so the
      # voice/companion turn produces no content and no tool call (silent "choke").
      # `qwen3_xml` is the matching parser for this model's format. Verified by feeding
      # the model's exact output to each parser offline (2026-06-14).
      - --tool-call-parser
      - qwen3_xml
      - --enforce-eager
      # Text-only. Qwen3.5-4B is natively vision-language, but its ViT encoder's
      # worst-case multimodal profiling (preprocessor longest_edge=16.7M px →
      # ~65k ViT patches → a 65k² attention matrix) triggers a 256 GiB HIP OOM on
      # gfx1151 (no flash-attn ViT kernel on ROCm). Disabling image/video input
      # skips that profiling so the text tower serves. Vision-bearing turns route
      # to the multimodal 35B (crow-chat, llama.cpp Vulkan) or grackle-vision.
      - --limit-mm-per-prompt
      - '{"image":0,"video":0}'
    restart: unless-stopped
    ipc: host
    shm_size: 8g
