services:
  llamacpp-rocm-qwen35-122b-mtp:
    # MTP (multi-token prediction) requires llama.cpp >= build 9189, which is
    # ONLY in the rocm-7.2.3 toolbox — NOT the rocm-7.2.1 image the other
    # crow llama.cpp bundles pin. Do not downgrade this image.
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2.3
    container_name: llamacpp-rocm-qwen35-122b-mtp
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      # Escalation model. Phase-1 benchmark (2026-05-23) chose Q4_K_XL + ROCm + MTP-n3:
      #   ~33.6 tok/s single-stream (code) vs ~24.6 at Q5_K_M (+37%), quality identical
      #   (PPL 1.7802 vs 1.7743, +0.33%). ROCm beats Vulkan on the 122B (opposite of the 35B).
      # Q4_K_XL (3 shards; llama.cpp auto-loads 2 & 3) pre-downloaded to
      #   /home/kh0pp/llm/hf-cache/qwen35-122b-a10b-mtp/UD-Q4_K_XL/
      # from unsloth/Qwen3.5-122B-A10B-MTP-GGUF. MoE 122B / 10B active.
      # MTP constraints: -np 1 only (NO --parallel). Vision via --mmproj added 2026-05-24.
      - -m
      - /models/qwen35-122b-a10b-mtp/UD-Q4_K_XL/Qwen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf
      # Vision: mmproj-F16 (~866 MiB), quant-independent (shared across Q4/Q5). MTP+vision
      # co-load works (the 35B runs both). Caveat: vision adds ~1 GB+ to the already-thin
      # deep-context headroom — avoid sending images during a >100K-token session.
      - --mmproj
      - /models/qwen35-122b-a10b-mtp/mmproj-F16.gguf
      - --alias
      - qwen3.5-122b-a10b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "on"
      - --no-mmap
      - -np
      - "1"
      - -c
      - "262144"
      # STABILIZE 2026-05-23: ctx-checkpoints disabled. The default 32 checkpoints
      # (~404 MiB each at depth, ~13 GB total) ACCUMULATED across multi-turn at ~129K
      # and exhausted the 124 GB UNIFIED memory pool (vram=0, gtt=124) -> kernel OOM
      # (exit 137) or HIP segfault in libamdhip64 (exit 139). Verified on :8013: with
      # checkpoints off, memory stays flat through a 143K fill (zero checkpoints) and
      # survives the prompt_save spike. See ~/HANDOFF-122b-stability.md.
      - --ctx-checkpoints
      - "0"
      - --checkpoint-every-n-tokens
      - "-1"
      # KV cache q8_0 (near-lossless) for extra headroom + smaller idle-cache state.
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - --spec-type
      - draft-mtp
      # n-max 2 (was 3): #23302 determinism bug at 3.
      - --spec-draft-n-max
      - "2"
      - --jinja
    restart: "no"
    ipc: host
    shm_size: 16g
