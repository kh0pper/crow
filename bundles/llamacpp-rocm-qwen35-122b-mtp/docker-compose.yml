services:
  llamacpp-rocm-qwen35-122b-mtp:
    # MTP (multi-token prediction) requires llama.cpp >= build 9189, which is
    # ONLY in the rocm-7.2.3 toolbox — NOT the rocm-7.2.1 image the other
    # crow llama.cpp bundles pin. Do not downgrade this image.
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2.3
    container_name: llamacpp-rocm-qwen35-122b-mtp
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      # Escalation model. MoE 122B / 10B active, ROCm + MTP. From unsloth/Qwen3.5-122B-A10B-MTP-GGUF.
      # QUANT = UD-Q3_K_XL (2026-05-24): switched from Q4_K_XL to free ~20 GB of the 124 GB unified
      #   pool. Verified quality-equivalent for coding — code-corpus PPL 1.9676 vs Q4 1.9609 (+0.34%,
      #   WITHIN the ±0.026 error bars), and side-by-side coding (bugfix/SQL/Manacher's) was correct +
      #   near-identical to Q4. Headroom: empty 88/36 GB free (was 108/16); at 143K ctx 22 GB free (was
      #   ~3); deep-soak low-watermark 21 GB (was 1.45). Slightly FASTER too (pp 113 vs 96). This ~20 GB
      #   makes the flag-band-aids (--no-cache-idle-slots / -ub 256) unnecessary — omitted for speed/UX.
      # Q3_K_XL: 3 shards in UD-Q3_K_XL/ (llama.cpp auto-loads 2 & 3). MTP: -np 1 only (NO --parallel).
      - -m
      - /models/qwen35-122b-a10b-mtp/UD-Q3_K_XL/Qwen3.5-122B-A10B-UD-Q3_K_XL-00001-of-00003.gguf
      # Vision: mmproj-F16 (~866 MiB), quant-independent (works the same on Q3/Q4/Q5). MTP+vision
      # co-load verified on this build. With Q3's ~20 GB extra headroom, images at depth are now safe.
      - --mmproj
      - /models/qwen35-122b-a10b-mtp/mmproj-F16.gguf
      - --alias
      - qwen3.5-122b-a10b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "on"
      - --no-mmap
      - -np
      - "1"
      - -c
      - "262144"
      # STABILIZE 2026-05-23: ctx-checkpoints disabled. The default 32 checkpoints
      # (~404 MiB each at depth, ~13 GB total) ACCUMULATED across multi-turn at ~129K
      # and exhausted the 124 GB UNIFIED memory pool (vram=0, gtt=124) -> kernel OOM
      # (exit 137) or HIP segfault in libamdhip64 (exit 139). Verified on :8013: with
      # checkpoints off, memory stays flat through a 143K fill (zero checkpoints) and
      # survives the prompt_save spike. See ~/HANDOFF-122b-stability.md.
      - --ctx-checkpoints
      - "0"
      - --checkpoint-every-n-tokens
      - "-1"
      # KV cache q8_0 (near-lossless) for extra headroom + smaller idle-cache state.
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - --spec-type
      - draft-mtp
      # n-max 2 (was 3): #23302 determinism bug at 3.
      - --spec-draft-n-max
      - "2"
      - --jinja
    restart: "no"
    # OOM safety net (2026-05-24): make THIS 122B container the kernel's preferred OOM
    # victim. On the 124 GB unified box it's by far the biggest allocation, so if a deep-
    # context spike exhausts the pool the kernel kills it (freeing ~108 GB instantly) FIRST,
    # instead of taking out sshd/postgres/gateway and wedging the box. sshd is already at
    # oom_score_adj=-1000. Restart with crow-swap-122 if it gets reaped.
    oom_score_adj: 800
    ipc: host
    shm_size: 16g
