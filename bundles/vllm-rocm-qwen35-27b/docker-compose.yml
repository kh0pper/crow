services:
  vllm-rocm-qwen35-27b:
    image: ${VLLM_ROCM_IMAGE}
    container_name: vllm-rocm-qwen35-27b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    environment:
      HF_HOME: /models
      HUGGING_FACE_HUB_TOKEN: ${VLLM_HF_TOKEN:-}
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8012:8000"
    entrypoint: ["vllm", "serve"]
    command:
      - Qwen/Qwen3.5-27B
      - --served-model-name
      - qwen3.5-27b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.65"
      - --max-model-len
      - "32768"
      - --max-num-seqs
      - "4"
      - --enable-auto-tool-choice
      # Qwen3.5 emits XML-style tool calls (<tool_call><function=NAME><parameter=KEY>…)
      # which `hermes` (expects <tool_call>{json}</tool_call>) cannot parse — tool calls
      # leak as raw text and are swallowed in streaming mode. `qwen3_xml` matches this
      # model generation's format (chat-template-verified 2026-06-14; same fix as the
      # qwen3.5-4b voice bundle). The older Qwen3 (non-.5) bundles correctly stay on hermes.
      - --tool-call-parser
      - qwen3_xml
      - --enforce-eager
    restart: unless-stopped
    ipc: host
    shm_size: 16g
