# Funkwhale — federated music server.
#
# Single-container `funkwhale/all-in-one` quickstart (bundles api + celery +
# nginx + postgres + redis into one image). Simpler to operate than the split
# stack and maps onto Funkwhale's published quickstart guide.
#
# Operators who need the split architecture (independent celery scaling,
# external postgres, etc.) should deploy Funkwhale's upstream docker-compose
# directly — this bundle prioritises one-click install.
#
# Data:
#   ~/.crow/funkwhale/data/       Everything — Postgres, Redis, audio uploads,
#                                 static, media, library metadata. Mounted at
#                                 /data inside the container.
#   ~/.crow/funkwhale/music/      Optional read-only library (mapped to /music
#                                 inside the container; MUSIC_DIRECTORY_PATH).
#
# Networks:
#   crow-federation (external)    Shared with Caddy for federation. Optional
#                                 — if you're tailnet-only and skipping Caddy,
#                                 the network still needs to exist (docker
#                                 network create crow-federation).
#
# Audio storage:
#   Set AWS_* vars in .env to route uploads to MinIO / S3. The gateway
#   install flow auto-injects these when shared storage is configured in the
#   Nest (see manifest.storage.translator="funkwhale"). Leave unset for
#   on-disk storage in the /data volume.
#
# Image: funkwhale/all-in-one:1.2.10 (pinned — verify upstream release notes
# + CVE feed before bumping). Upstream currently ships 1.2.x stable.

networks:
  crow-federation:
    external: true
  default:

services:
  funkwhale:
    image: funkwhale/all-in-one:1.2.10
    container_name: crow-funkwhale
    networks:
      - default
      - crow-federation
    environment:
      FUNKWHALE_HOSTNAME: ${FUNKWHALE_HOSTNAME}
      FUNKWHALE_PROTOCOL: ${FUNKWHALE_PROTOCOL:-https}
      DJANGO_SECRET_KEY: ${FUNKWHALE_DJANGO_SECRET_KEY}
      # Per-deploy TLS termination choice. 'https' is correct if a reverse
      # proxy (Caddy) handles TLS; 'http' for tailnet-direct without a cert.
      NESTED_PROXY: ${FUNKWHALE_NESTED_PROXY:-0}
      # allowed_hosts includes the hostname + internal service names
      DJANGO_ALLOWED_HOSTS: ${FUNKWHALE_HOSTNAME},funkwhale,localhost,127.0.0.1
      # S3 storage (set by the gateway install flow when shared storage is
      # configured in the Nest — see manifest.storage.translator=funkwhale).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_LOCATION: ${AWS_LOCATION:-}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-true}
      AWS_QUERYSTRING_EXPIRE: ${AWS_QUERYSTRING_EXPIRE:-3600}
      NGINX_MAX_BODY_SIZE: ${FUNKWHALE_NGINX_MAX_BODY_SIZE:-100M}
    volumes:
      - ${FUNKWHALE_DATA_DIR:-~/.crow/funkwhale}/data:/data
      - ${FUNKWHALE_MUSIC_DIR:-~/.crow/funkwhale/music}:/music:ro
    ports:
      # Tailnet-direct path (set FUNKWHALE_NGINX_BIND_ADDR=<tailnet-ip> in
      # .env to skip Caddy for local/tailnet deployments). Leave unset when
      # fronting with Caddy — Caddy reverse-proxies via the crow-federation
      # Docker network.
      - "${FUNKWHALE_NGINX_BIND_ADDR:-127.0.0.1}:${FUNKWHALE_NGINX_BIND_PORT:-8600}:80"
    init: true
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/v1/instance/nodeinfo/2.0/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
