<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Crow on perch — works everywhere icon -->
  <defs>
    <linearGradient id="platGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Perch / branch -->
  <path d="M4 34 Q16 30 32 32 Q40 33 46 36" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crow sitting on perch -->
  <path d="M22 32 Q18 26 18 20 Q18 14 22 11 Q26 8 30 11 Q34 14 34 20 Q34 26 30 32 Z" fill="#2d2d3d"/>
  <!-- Wing -->
  <path d="M26 18 Q32 16 36 20 Q34 24 28 26 Z" fill="#1a1a2e"/>
  <!-- Beak -->
  <path d="M20 17 L12 19 L14 21 L20 19 Z" fill="#3d3d4d"/>
  <!-- Eye -->
  <circle cx="23" cy="16" r="2" fill="#fbbf24"/>
  <circle cx="23" cy="16" r="1" fill="#1a1a2e"/>
  <!-- Tail -->
  <path d="M32 28 Q38 30 40 26" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <!-- Feet gripping perch -->
  <path d="M24 32 L23 34 Q22 35 24 35" fill="none" stroke="#3d3d4d" stroke-width="1" stroke-linecap="round"/>
  <path d="M28 32 L29 34 Q30 35 28 35" fill="none" stroke="#3d3d4d" stroke-width="1" stroke-linecap="round"/>
  <!-- Platform indicators -->
  <rect x="6" y="40" width="6" height="4" rx="1" fill="url(#platGrad)" opacity="0.5"/>
  <rect x="14" y="40" width="6" height="4" rx="1" fill="url(#platGrad)" opacity="0.6"/>
  <rect x="22" y="40" width="6" height="4" rx="1" fill="url(#platGrad)" opacity="0.7"/>
  <rect x="30" y="40" width="6" height="4" rx="1" fill="url(#platGrad)" opacity="0.8"/>
  <rect x="38" y="40" width="6" height="4" rx="1" fill="url(#platGrad)" opacity="0.5"/>
</svg>
