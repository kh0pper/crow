  <line x1="24" y1="20" x2="34" y2="24" stroke="#6366f1" stroke-width="0.4" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="14" y1="26" x2="10" y2="30" stroke="#818cf8" stroke-width="0.3" opacity="0.3" stroke-dasharray="2,2"/>
  <line x1="34" y1="26" x2="38" y2="30" stroke="#818cf8" stroke-width="0.3" opacity="0.3" stroke-dasharray="2,2"/>
  <!-- Hub dot -->
  <circle cx="24" cy="36" r="3" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <circle cx="24" cy="36" r="1" fill="#22d3ee" opacity="0.7"/>
  <line x1="24" y1="20" x2="24" y2="33" stroke="#22d3ee" stroke-width="0.4" opacity="0.3" stroke-dasharray="2,2"/>
